name: Auto Calculate Dev Time

on:
  # 1. 只有當 Issue 狀態變成關閉時觸發
  issues:
    types: [closed]

  # 2. 當有人新增或修改留言時觸發
  issue_comment:
    types: [created, edited]

  # 3. 手動觸發按鈕
  workflow_dispatch:

permissions:
  issues: write # 賦予機器人寫入留言和貼標籤的權限
  contents: read

jobs:
  calculate-time:
    runs-on: ubuntu-latest

    if: ${{ github.event_name == 'workflow_dispatch' || github.event.issue.state == 'closed' }}

    # 避免短時間內重複觸發導致衝突 (Concurrency Control)
    concurrency:
      group: calculate-time-group
      cancel-in-progress: false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: uv pip install PyGithub python-dateutil python-dotenv

      - name: Run calculation script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: uv run python calc_time.py
